<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Debug</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: sans-serif; padding: 20px; background: #f5f0e8; }
#log { background: #fff; border-radius: 8px; padding: 16px; margin-top: 16px; font-size: 13px; line-height: 2; word-break: break-all; }
.ok { color: green; }
.err { color: red; font-weight: bold; }
</style>
</head>
<body>
<h2>Stock デバッグ</h2>
<div id="log">確認中...</div>
<script>
const log = document.getElementById('log');
function addLog(msg, type) {
  const d = document.createElement('div');
  d.className = type || '';
  d.textContent = msg;
  log.appendChild(d);
}
log.innerHTML = '';

if (typeof window.supabase === 'undefined') {
  addLog('NG: Supabaseライブラリ読み込み失敗', 'err');
} else {
  addLog('OK: Supabaseライブラリ読み込み成功', 'ok');
  const URL = 'https://khrbhvshzzqvclsthxtz.supabase.co';
  const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtocmJodnNoenpxdmNsc3RoeHR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MzY5NTUsImV4cCI6MjA5MzExMjk1NX0.AxyNWIS19N8IhgEBSAL6AEiXHBhToYHiZf9OSC5P2jU';
  const client = window.supabase.createClient(URL, KEY);
  addLog('OK: クライアント作成成功', 'ok');
  addLog('取得中...', '');
  client.from('categories').select('*').limit(3).then(function(r) {
    if (r.error) {
      addLog('NG: ' + r.error.message, 'err');
    } else {
      addLog('OK: categories ' + r.data.length + '件取得', 'ok');
    }
  }).catch(function(e) {
    addLog('例外: ' + e.message, 'err');
  });
}
</script>
</body>
</html>
